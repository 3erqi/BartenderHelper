<div class="form-page">
  <div class="form-header">
    <button mat-icon-button routerLink="/home">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>{{ editId ? 'Edit Cocktail' : 'Add Cocktail' }}</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Description</mat-label>
      <input matInput formControlName="description" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Glass Type</mat-label>
      <input matInput formControlName="glassType" placeholder="e.g. Rocks, Coupe, Highball" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Instructions</mat-label>
      <textarea matInput formControlName="instructions" rows="4"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Image URL (optional)</mat-label>
      <input matInput formControlName="imageUrl" />
    </mat-form-field>

    <h2>Ingredients</h2>

    <div formArrayName="ingredients">
      @for (ing of ingredients.controls; track $index) {
      <div [formGroupName]="$index" class="ingredient-row">
        <mat-form-field appearance="outline" class="amount-field">
          <mat-label>Amount</mat-label>
          <input matInput formControlName="amount" />
        </mat-form-field>

        <mat-form-field appearance="outline" floatLabel="always" class="unit-field">
          <mat-label>Unit</mat-label>
          <input matInput formControlName="unit" placeholder="oz, ml, dash..." />
        </mat-form-field>

        <mat-form-field appearance="outline" class="name-field">
          <mat-label>Ingredient</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <button
          mat-icon-button
          type="button"
          color="warn"
          (click)="removeIngredient($index)"
          [disabled]="ingredients.length === 1"
        >
          <mat-icon>remove_circle_outline</mat-icon>
        </button>
      </div>
      }
    </div>

    <button mat-stroked-button type="button" (click)="addIngredient()">
      <mat-icon>add</mat-icon> Add Ingredient
    </button>

    @if (error()) {
    <p class="error">{{ error() }}</p>
    }

    <div class="submit-row">
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || saving()">
        {{ saving() ? 'Saving...' : (editId ? 'Save Changes' : 'Create Cocktail') }}
      </button>
    </div>
  </form>
</div>

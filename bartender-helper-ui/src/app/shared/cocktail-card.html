<mat-card class="card" (click)="openDialog()">
  <div class="card-image">
    @if (cocktail().imageUrl) {
    <img [src]="cocktail().imageUrl!" alt="{{ cocktail().name }}" class="cocktail-img" />
    } @else {
    <div class="cocktail-img-placeholder">
      <mat-icon>local_bar</mat-icon>
    </div>
    }
  </div>
  <mat-card-header>
    <mat-card-title>{{ cocktail().name }}</mat-card-title>
    <mat-card-subtitle>{{ cocktail().glassType }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p class="description">{{ cocktail().description }}</p>
  </mat-card-content>
</mat-card>

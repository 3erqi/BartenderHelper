<mat-card [routerLink]="['/cocktail', cocktail().id]" class="card">
  <mat-card-header>
    <mat-card-title>{{ cocktail().name }}</mat-card-title>
    <mat-card-subtitle>{{ cocktail().glassType }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p class="description">{{ cocktail().description }}</p>
  </mat-card-content>
</mat-card>
